    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn - Mini App</title>
    
    <!-- টেলিগ্রামের সঠিক অফিশিয়াল স্ক্রিপ্ট -->
    <script src="telegram.org"></script>
    
    <!-- AdsGram অ্যাড-এর সঠিক অফিশিয়াল স্ক্রিপ্ট -->
    <script src="adsgram.ai"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #0088cc; }
        p { font-size: 16px; color: #666; }
        .btn {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #006699; }
        #video-container {
            display: none;
            margin-top: 20px;
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>স্বাগতম!</h2>
    <p>ভিডিওটি আনলক করতে নিচের বাটনে ক্লিক করে একটি ছোট অ্যাড দেখুন।</p>
    
    <!-- অ্যাড দেখার বাটন -->
    <button id="adBtn" class="btn">ভিডিও আনলক করুন</button>

    <!-- ভিডিও প্লেয়ার -->
    <div id="video-container">
        <h3>আপনার ভিডিওটি এখন দেখুন:</h3>
        <video id="myVideo" controls>
            <source src="videos/promo_video.mp4" type="video/mp4">
            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
        </video>
        <p style="color: green; font-weight: bold;">সফলভাবে আনলক হয়েছে!</p>
    </div>
</div>

<script>
    // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজেশন
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    // AdsGram সঠিক ইনিশিয়ালাইজেশন (উইন্ডো লোড হওয়ার পর)
    // blockId "30091" টেস্ট আইডি হিসেবে ব্যবহৃত হচ্ছে
    const AdController = window.Adsgram.init({ 
        blockId: "30091", 
        debug: true 
    });

    const adBtn = document.getElementById('adBtn');
    const videoContainer = document.getElementById('video-container');
    const myVideo = document.getElementById('myVideo');

    adBtn.addEventListener('click', () => {
        // বাটন সাময়িকভাবে ডিজেবল করা যাতে ডাবল ক্লিক না হয়
        adBtn.disabled = true;
        adBtn.innerText = "অ্যাড লোড হচ্ছে...";

        // AdsGram নিয়ম অনুযায়ী অ্যাড দেখানো শুরু
        AdController.show().then((result) => {
            // ব্যবহারকারী সম্পূর্ণ অ্যাড দেখলে এই অংশটি কাজ করবে
            adBtn.style.display = 'none';
            videoContainer.style.display = 'block';
            myVideo.play().catch(err => console.log("Auto-play blocked by browser. User must click play."));
        }).catch((result) => {
            // অ্যাড লোড না হলে বা ব্যবহারকারী মাঝপথে কেটে দিলে (স্কিপ করলে)
            adBtn.disabled = false;
            adBtn.innerText = "ভিডিও আনলক করুন";
            
            if (result.error) {
                alert("অ্যাড লোড হতে সমস্যা হয়েছে। আবার চেষ্টা করুন।");
                console.error("Ad Error:", result.description);
            } else {
                alert("দুঃখিত! ভিডিওটি দেখতে হলে আপনাকে সম্পূর্ণ অ্যাডটি দেখতে হবে।");
            }
        });
    });
</script>

</body>
</html>
