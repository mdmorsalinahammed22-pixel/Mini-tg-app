<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn - Mini App</title>
    <!-- টেলিগ্রামের মেইন স্ক্রিপ্ট -->
    <script src="https://telegram.org"></script>
    <!-- AdsGram অ্যাড স্ক্রিপ্ট -->
    <script src="https://adsgram.ai"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #0088cc; }
        p { font-size: 16px; color: #666; }
        .btn {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #006699; }
        #video-container {
            display: none;
            margin-top: 20px;
        }
        iframe {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>স্বাগতম!</h2>
    <p>ভিডিওটি আনলক করতে নিচের বাটনে ক্লিক করে একটি ছোট অ্যাড দেখুন।</p>
    
    <!-- অ্যাড দেখার বাটন -->
    <button id="adBtn" class="btn">ভিডিও আনলক করুন</button>

    <!-- ভিডিও প্লেয়ার (শুরুতে হাইড করা থাকবে) -->
    <div id="video-container">
        <h3>আপনার ভিডিওটি এখন দেখুন:</h3>
        <iframe src="https://youtube.com" title="Video Player"></iframe>
        <p style="color: green; font-weight: bold;">সফলভাবে আনলক হয়েছে!</p>
    </div>
</div>

<script>
    // AdsGram ইনিশিয়ালাইজেশন
    // এখানে 'YOUR_BLOCK_ID' এর জায়গায় আপনার AdsGram থেকে পাওয়া ID বসান
    const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });

    const adBtn = document.getElementById('adBtn');
    const videoContainer = document.getElementById('video-container');

    adBtn.addEventListener('click', () => {
        // অ্যাড দেখানো শুরু
        AdController.show().then((result) => {
            // অ্যাড দেখা শেষ হলে ভিডিও দেখাবে
            adBtn.style.display = 'none';
            videoContainer.style.display = 'block';
        }).catch((error) => {
            // অ্যাড না দেখলে বা কোনো সমস্যা হলে
            alert("দুঃখিত! ভিডিওটি দেখতে হলে আপনাকে সম্পূর্ণ অ্যাডটি দেখতে হবে।");
            console.error("Ad Error:", error);
        });
    });

    // টেলিগ্রাম ওয়েব অ্যাপ সেটআপ
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand(); // অ্যাপটি পুরো স্ক্রিন জুড়ে দেখাবে
</script>

</body>
</html>
